name: Sync dist branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dist
  cancel-in-progress: true

jobs:
  sync-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebuild dist branch from main
        run: |
          git fetch origin

          cp composer.dist.json /tmp/composer.dist.json

          git checkout -B dist origin/main

          if [ -f .distignore ]; then
            while IFS= read -r path || [ -n "$path" ]; do
              path="$(echo "$path" | xargs)"

              [ -z "$path" ] && continue

              case "$path" in
                \#*) continue ;;
              esac

              path="${path#/}"

              git rm -rf --ignore-unmatch "$path"
            done < .distignore
          fi

          cp /tmp/composer.dist.json composer.json
          git add composer.json

          mkdir -p .github/workflows
          git checkout origin/main -- .github/workflows/release-assets.yml || true
          git add .github/workflows/release-assets.yml || true

          if ! git diff --cached --quiet; then
            git commit -m "Prepare dist branch from main"
          fi

          git push origin dist --force